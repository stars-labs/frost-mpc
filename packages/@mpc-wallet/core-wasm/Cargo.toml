[package]
name = "mpc-wallet-core-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.99"
wasm-bindgen-futures = "0.4.49"
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.143"
console_error_panic_hook = { version = "0.1.7", optional = true }
web-sys = { version = "0.3.76", features = ["console"] }
# Inherit the workspace-level getrandom (version 0.4 + wasm_js feature)
# so wasm-pack builds correctly resolve the js-sys backend. See root
# Cargo.toml for the feature-name rationale.
getrandom.workspace = true
# FROST 2.2 transitively pulls getrandom 0.2 via rand_core 0.6. Cargo
# treats this as a separate crate version from the 0.4 above, so the
# feature set has to be propagated per-version. We declare an explicit
# 0.2 entry with the `js` feature (renamed to `wasm_js` in 0.4) so the
# wasm backend is active on both. No code here imports it directly;
# this entry exists purely for feature-unification. Renamed via
# `package =` so it doesn't collide with the main `getrandom` name.
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
hex = "0.4.3"
base64 = "0.22.1"

# Use our shared frost-core library
mpc-wallet-frost-core = { path = "../frost-core" }

# Still need these for specific types
frost-secp256k1 = { version = "2.2.0", features = ["serde"] }
frost-ed25519 = { version = "2.2.0", features = ["serde"] }

# For random number generation. rand_core 0.6 + rand_chacha 0.3 match
# what FROST 2.2 transitively requires — pinning here avoids having
# cargo resolve two majors of rand_core (0.6 for FROST, 0.9+ for
# higher-level `rand`) and failing feature unification.
rand = "0.8"
rand_core = { version = "0.6", features = ["getrandom"] }
rand_chacha = "0.3"

[features]
default = ["console_error_panic_hook"]

[dev-dependencies]
wasm-bindgen-test = "0.3.49"
